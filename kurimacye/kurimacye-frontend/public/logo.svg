<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient: Gold to Terracotta -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2CC8F" />
      <stop offset="100%" stop-color="#E07A5F" />
    </linearGradient>
  </defs>
  
  <!-- Icon Group: Unmistakable Shopping Cart -->
  <g transform="translate(6, 4)">
    <!-- Handle and Chassis Frame -->
    <path d="M 4 10 H 8 L 12 30 H 26" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Cart Basket -->
    <path d="M 9 14 H 29 L 26 25 H 12 Z" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Wheels -->
    <circle cx="13" cy="34" r="3" fill="url(#logoGrad)" />
    <circle cx="24" cy="34" r="3" fill="url(#logoGrad)" />
  </g>
  
  <!-- Typography Group -->
  <g transform="translate(48, 31)">
    <text font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">Kuri <tspan fill="url(#logoGrad)">Macye</tspan></text>
  </g>
</svg>
